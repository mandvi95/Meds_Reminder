<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Logs – DoseMed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .timeline { display: flex; flex-direction: column; gap: 12px; }
    .timeline-item { display: flex; gap: 12px; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--white); }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); margin-top: 7px; }
    .timeline-action { font-weight: 700; font-size: 14px; }
    .timeline-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .timeline-details { font-size: 13px; margin-top: 4px; color: var(--text); }
  </style>
</head>
<body>
  <div class="app-layout" id="app-layout"></div>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    buildLayout('logs', 'Activity Logs', 'Track medicine and reminder changes');
    let logs = [];

    setTimeout(() => {
      document.getElementById('topbarActions').innerHTML = `
        <button class="btn btn-outline" onclick="downloadCsv()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download CSV
        </button>
      `;
    }, 50);

    async function loadLogs() {
      const res = await api.get('/logs');
      logs = res?.data?.logs || [];
      renderLogs();
    }

    function renderLogs() {
      const body = document.getElementById('pageBody');
      if (!logs.length) {
        body.innerHTML = `
          <div class="empty-state" style="min-height:380px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 13l3 3 7-7"/></svg>
            <h3>No activity yet</h3>
            <p>Changes to medicines, reminders, and family access will appear here.</p>
          </div>
        `;
        return;
      }

      body.innerHTML = `
        <div class="timeline">
          ${logs.map(log => `
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div style="flex:1;">
                <div class="timeline-action">${log.action}</div>
                <div class="timeline-details">${log.details || ''}</div>
                <div class="timeline-meta">By ${log.actor_name || 'Unknown'} • ${new Date(log.created_at).toLocaleString('en-IN')}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function escapeCsv(value) {
      const str = String(value ?? '');
      if (/[",\n]/.test(str)) return `"${str.replace(/"/g, '""')}"`;
      return str;
    }

    function downloadCsv() {
      if (!logs.length) {
        showToast('No logs available for export', 'warning');
        return;
      }
      const header = ['Action', 'Details', 'Actor', 'Created At'];
      const rows = logs.map(log => [log.action, log.details, log.actor_name, new Date(log.created_at).toISOString()]);
      const csv = [header, ...rows].map(row => row.map(escapeCsv).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `DoseMed-activity-${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    loadLogs();
  </script>
</body>
</html>
