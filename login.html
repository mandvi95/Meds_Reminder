<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – Mycare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      background: linear-gradient(135deg, #EBF6FD 0%, #D1EEFA 50%, #B3E0F7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo img { height: 52px; border-radius: 10px; margin: 0 auto; }
    .auth-logo p { color: var(--text-muted); font-size: 14px; margin-top: 8px; }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    .auth-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .auth-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .error-box {
      background: #FEE2E2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: #DC2626;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <img src="assets/Square_LOGO.jpeg" alt="Sevra AI">
      <p>A Healthcare Revolution</p>
    </div>

    <div class="auth-card">
      <h1>Welcome back</h1>
      <p>Sign in to your Mycare account</p>

      <div class="error-box" id="errorBox"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          <div style="margin-top:8px;text-align:right;">
            <a href="forgot-password.html" style="font-size:12px;">Forgot password?</a>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="submitBtn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'none';

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const res = await api.post('/auth/login', { email, password });

      if (res && res.ok) {
        localStorage.setItem('Mycare_token', res.data.token);
        localStorage.setItem('Mycare_user', JSON.stringify(res.data.user));
        window.location.href = 'dashboard.html';
      } else {
        let errorMsg = res?.data?.error;
        if (!errorMsg) {
          if (res?.status === 401) errorMsg = 'Incorrect email or password.';
          else if (res?.status === 403) errorMsg = 'Email not verified. Please sign up again to receive a new OTP.';
          else if (res?.status === 404) errorMsg = 'No user exists with this email address.';
          else errorMsg = 'Sign in failed. Please try again.';
        } else if (res?.status === 403) {
          errorMsg = 'Email not verified. Please sign up again to receive a new OTP.';
        }
        
        errorBox.textContent = errorMsg;
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }
  </script>
</body>
</html>
