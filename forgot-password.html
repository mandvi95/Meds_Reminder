<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – MyCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { background: linear-gradient(135deg, #EBF6FD 0%, #D1EEFA 50%, #B3E0F7 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-container { width: 100%; max-width: 440px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo img { height: 52px; border-radius: 10px; margin: 0 auto; }
    .auth-card { background: var(--white); border-radius: var(--radius); padding: 36px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .error-box { background: #FEE2E2; border: 1px solid #FECACA; border-radius: var(--radius-sm); padding: 12px 16px; color: #DC2626; font-size: 13px; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <img src="assets/Square_LOGO.jpeg" alt="Sevra AI">
    </div>
    <div class="auth-card">
      <h1 style="font-size:24px;font-weight:800;margin-bottom:6px;">Reset password</h1>
      <p style="color:var(--text-muted);font-size:14px;margin-bottom:28px;">We will send an OTP to your registered phone number.</p>
      <div class="error-box" id="errorBox"></div>

      <form id="requestForm" onsubmit="requestOtp(event)">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="requestBtn">Send OTP</button>
      </form>

      <form id="resetForm" onsubmit="resetPassword(event)" style="display:none;">
        <div class="form-group">
          <label for="otp">OTP</label>
          <input type="text" id="otp" required placeholder="123456">
        </div>
        <div class="form-group">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" required minlength="6" placeholder="Minimum 6 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="resetBtn">Reset Password</button>
      </form>

      <div style="text-align:center;margin-top:22px;font-size:14px;color:var(--text-muted);">
        Back to <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    redirectIfLoggedIn();
    let resetEmail = '';

    function showError(message) {
      const box = document.getElementById('errorBox');
      box.textContent = message;
      box.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    async function requestOtp(e) {
      e.preventDefault();
      hideError();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const btn = document.getElementById('requestBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const res = await api.post('/auth/forgot-password', { email });
      btn.disabled = false;
      btn.innerHTML = 'Send OTP';

      if (!res?.ok) {
        showError(res?.data?.error || 'Unable to send OTP');
        return;
      }

      resetEmail = email;
      document.getElementById('requestForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
      showToast('If the account exists, OTP was sent.', 'info');
      if (res?.data?.mockOtp) {
        setTimeout(() => alert('TEST MODE: Reset OTP is ' + res.data.mockOtp), 500);
      }
    }

    async function resetPassword(e) {
      e.preventDefault();
      hideError();
      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const payload = {
        email: resetEmail,
        otp: document.getElementById('otp').value.trim(),
        newPassword: document.getElementById('newPassword').value
      };
      const res = await api.post('/auth/reset-password', payload);
      btn.disabled = false;
      btn.innerHTML = 'Reset Password';

      if (!res?.ok) {
        showError(res?.data?.error || 'Failed to reset password');
        return;
      }

      showToast('Password reset successful. Please sign in.', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 900);
    }
  </script>
</body>
</html>
