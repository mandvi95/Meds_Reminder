<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – DoseMed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      background: linear-gradient(135deg, #EBF6FD 0%, #D1EEFA 50%, #B3E0F7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-container { width: 100%; max-width: 460px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo img { height: 52px; border-radius: 10px; margin: 0 auto; }
    .auth-logo p { color: var(--text-muted); font-size: 14px; margin-top: 8px; }
    .auth-card { background: var(--white); border-radius: var(--radius); padding: 36px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .auth-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .auth-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
    .error-box { background: #FEE2E2; border: 1px solid #FECACA; border-radius: var(--radius-sm); padding: 12px 16px; color: #DC2626; font-size: 13px; margin-bottom: 20px; display: none; }
    .phone-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <img src="assets/Square_LOGO.jpeg" alt="Sevra AI">
      <p>A Healthcare Revolution</p>
    </div>

    <div class="auth-card">
      <h1>Create your account</h1>
      <p>Start managing your health with DoseMed today</p>

      <div class="error-box" id="errorBox"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="phone">Phone Number <span style="color:var(--text-muted);font-weight:400;">(for SMS/call reminders)</span></label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" required>
          <div class="phone-hint">Include country code for SMS & voice call reminders (e.g. +91 for India)</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="submitBtn">
          Create Account
        </button>
      </form>

      <form id="otpForm" onsubmit="handleVerify(event)" style="display:none;">
        <p style="color:var(--primary); font-weight: 600; margin-bottom: 16px; text-align: center;">An OTP has been sent to your email.</p>
        <div class="form-group">
          <label for="otp">Enter OTP</label>
          <input type="text" id="otp" placeholder="123456" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="verifyBtn">
          Verify & Sign In
        </button>
      </form>

      <div class="auth-footer" id="authFooter">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    let registeredEmail = '';

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'none';

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;

      const res = await api.post('/auth/register', { name, email, phone, password });

      if (res && res.ok) {
        showToast('OTP sent to your email!', 'info');
        if (res.data && res.data.mockOtp) {
          setTimeout(() => alert('TEST MODE: Your OTP is ' + res.data.mockOtp), 500);
        }
        registeredEmail = email;
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('authFooter').style.display = 'none';
        document.getElementById('otpForm').style.display = 'block';
      } else {
        errorBox.textContent = res?.data?.error || 'Registration failed. Please try again.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
      }
    }

    async function handleVerify(e) {
      e.preventDefault();
      const btn = document.getElementById('verifyBtn');
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'none';

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const otp = document.getElementById('otp').value;

      const res = await api.post('/auth/verify-otp', { email: registeredEmail, otp });

      if (res && res.ok) {
        localStorage.setItem('DoseMed_token', res.data.token);
        localStorage.setItem('DoseMed_user', JSON.stringify(res.data.user));
        showToast('Account verified successfully!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } else {
        errorBox.textContent = res?.data?.error || 'Verification failed. Invalid OTP.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Verify & Sign In';
      }
    }
  </script>
</body>
</html>
